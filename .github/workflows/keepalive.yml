name: Keep Streamlit App Awake

on:
  schedule:
    # Run every 6 hours to prevent app from sleeping
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://pinterest-factory-example.streamlit.app" \
            || echo "Ping failed"
      - name: Health Check Notification
        if: failure()
        run: |
          echo "Keepalive ping failed at $(date)"
